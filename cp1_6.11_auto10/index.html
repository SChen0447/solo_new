<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Particle System Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #ffffff;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      min-width: 0;
    }
    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #panel-toggle {
      position: fixed;
      top: 20px;
      right: 340px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(0, 212, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: #00d4ff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s ease;
      z-index: 101;
    }
    #panel-toggle:hover {
      background: rgba(0, 212, 255, 0.25);
      transform: scale(1.05);
    }
    #panel-toggle.collapsed {
      right: 20px;
    }
    #control-panel {
      width: 320px;
      height: 100%;
      background: rgba(26, 26, 46, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(0, 212, 255, 0.2);
      padding: 24px 20px;
      overflow-y: auto;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), width 0.35s ease;
      position: relative;
      z-index: 100;
    }
    #control-panel.collapsed {
      transform: translateX(100%);
      width: 0;
      padding: 0;
      overflow: hidden;
    }
    .panel-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.15);
    }
    .panel-title {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #00d4ff, #9d4edd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .panel-subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }
    .control-group {
      margin-bottom: 22px;
    }
    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }
    .control-value {
      color: #00d4ff;
      font-weight: 500;
    }
    .control-value-tooltip {
      position: absolute;
      background: rgba(0, 212, 255);
      color: #1a1a2e;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    .slider-wrapper {
      position: relative;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(0, 212, 255, 0.15);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #00d4ff, #9d4edd);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 16px rgba(0, 212, 255, 0.8);
    }
    select {
      width: 100%;
      padding: 8px 12px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.2);
      color: #fff;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus {
      border-color: #00d4ff;
    }
    select option {
      background: #1a1a2e;
      color: #fff;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1;
      min-width: 80px;
      padding: 10px 14px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.25);
      color: #00d4ff;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s ease;
      font-weight: 500;
    }
    .btn:hover {
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(157, 78, 221, 0.2));
      border-color: #00d4ff;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 212, 255, 0.2);
    }
    .btn.active {
      background: linear-gradient(135deg, #00d4ff, #9d4edd);
      color: #1a1a2e;
      border-color: transparent;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #9d4edd);
      color: #1a1a2e;
      border-color: transparent;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #00e5ff, #a855f7);
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.35);
    }
    .preset-btns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .preset-btn {
      padding: 10px 8px;
    }
    .toggle-switch {
      position: relative;
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
      gap: 10px;
    }
    .toggle-switch input {
      display: none;
    }
    .toggle-slider {
      position: relative;
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      transition: background 0.3s;
    }
    .toggle-slider::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: linear-gradient(135deg, #00d4ff, #9d4edd);
    }
    .toggle-switch input:checked + .toggle-slider::after {
      transform: translateX(20px);
      background: #1a1a2e;
    }
    .toggle-text {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }
    .stats-bar {
      position: fixed;
      bottom: 16px;
      left: 20px;
      display: flex;
      gap: 16px;
      z-index: 50;
    }
    .stat-item {
      padding: 6px 12px;
      background: rgba(26, 26, 46, 0.75);
      backdrop-filter: blur(10px);
      border-radius: 6px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }
    .stat-value {
      color: #00d4ff;
      font-weight: 600;
    }
    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }
      #canvas-container {
        height: 100%;
      }
      #control-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 45%;
        border-left: none;
        border-top: 1px solid rgba(0, 212, 255, 0.2);
        transform: translateY(100%);
        padding: 20px;
      }
      #control-panel:not(.collapsed) {
        transform: translateY(0);
      }
      #control-panel {
        transform: translateY(100%);
      }
      #panel-toggle {
        top: auto;
        bottom: calc(45% + 10px);
        right: 20px;
        left: auto;
      }
      #panel-toggle.collapsed {
        bottom: 20px;
      }
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.2);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.4);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <button id="panel-toggle" title="切换面板">⚙</button>
    <aside id="control-panel" class="collapsed">
      <div class="panel-header">
        <h1 class="panel-title">粒子系统控制台</h1>
        <p class="panel-subtitle">3D Particle Visualizer</p>
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>粒子数量</span>
          <span class="control-value" id="count-value">5000</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="particle-count" min="1000" max="10000" step="500" value="5000">
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>运动速度</span>
          <span class="control-value" id="speed-value">1.0</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="particle-speed" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>粒子大小</span>
          <span class="control-value" id="size-value">0.15</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="particle-size" min="0.05" max="0.5" step="0.01" value="0.15">
        </div>
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>颜色模式</span>
        </div>
        <select id="color-mode">
          <option value="rainbow">🌈 彩虹渐变</option>
          <option value="warm">🔥 暖色调</option>
          <option value="cool">❄️ 冷色调</option>
          <option value="neon">✨ 霓虹紫</option>
        </select>
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>粒子形状</span>
        </div>
        <select id="particle-shape">
          <option value="circle">● 圆形</option>
          <option value="triangle">▲ 三角形</option>
          <option value="square">■ 方形</option>
        </select>
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>运动模式</span>
        </div>
        <select id="motion-mode">
          <option value="rotate">🌀 旋转</option>
          <option value="wave">🌊 波动</option>
          <option value="cluster">🎯 聚集</option>
          <option value="diffuse">💨 扩散</option>
          <option value="random">🎲 随机</option>
        </select>
      </div>
      <div class="control-group">
        <label class="toggle-switch">
          <input type="checkbox" id="trail-toggle">
          <span class="toggle-slider"></span>
          <span class="toggle-text">轨迹拖尾效果</span>
        </label>
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>预设视角</span>
        </div>
        <div class="preset-btns">
          <button class="btn preset-btn" data-view="top">顶部</button>
          <button class="btn preset-btn" data-view="front">正面</button>
          <button class="btn preset-btn" data-view="side">侧45°</button>
        </div>
      </div>
      <div class="control-group">
        <div class="btn-row">
          <button class="btn" id="pause-btn">⏸ 暂停</button>
          <button class="btn btn-primary" id="reset-btn">↻ 重置</button>
        </div>
      </div>
    </aside>
    <div class="stats-bar">
      <div class="stat-item">FPS: <span class="stat-value" id="fps-counter">60</span></div>
      <div class="stat-item">粒子: <span class="stat-value" id="particle-counter">5000</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
