<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交互式城市天际线生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a15;
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
    }

    #canvas-container {
      flex: 1;
      min-width: 800px;
      min-height: 600px;
      position: relative;
    }

    #scene-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #toggle-day-night {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #2a2a3e;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      z-index: 100;
    }

    #toggle-day-night:hover {
      background: #3a3a4a;
    }

    #toggle-day-night svg {
      width: 20px;
      height: 20px;
      fill: #ffffff;
    }

    .control-panel {
      width: 280px;
      background: #1e1e2e;
      padding: 20px;
      border-radius: 12px;
      margin: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex-shrink: 0;
      align-self: flex-start;
      max-height: calc(100% - 40px);
      overflow-y: auto;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .panel-subtitle {
      font-size: 12px;
      color: #8a8a9e;
      margin-bottom: 16px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-label {
      font-size: 13px;
      color: #c0c0d0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .control-value {
      font-weight: 600;
      color: #00d4aa;
    }

    .slider-container {
      position: relative;
      width: 200px;
      height: 8px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 200px;
      height: 8px;
      background: #3a3a4a;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: #00d4aa;
      border-radius: 50%;
      cursor: pointer;
      transition: box-shadow 0.2s ease;
      border: 2px solid #ffffff;
    }

    input[type="range"]:active::-webkit-slider-thumb {
      box-shadow: 0 0 8px 4px rgba(0, 212, 170, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: #00d4aa;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid #ffffff;
      transition: box-shadow 0.2s ease;
    }

    input[type="range"]:active::-moz-range-thumb {
      box-shadow: 0 0 8px 4px rgba(0, 212, 170, 0.6);
    }

    select {
      width: 100%;
      height: 40px;
      background: #2a2a3e;
      border: 1px solid #3a3a4a;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      padding: 0 12px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s ease;
    }

    select:hover, select:focus {
      border-color: #00d4aa;
    }

    #random-generate {
      width: 100%;
      height: 48px;
      background: #00d4aa;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 8px;
    }

    #random-generate:hover {
      background: #00b894;
    }

    #random-generate:active {
      transform: scale(0.98);
    }

    .fps-counter {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(30, 30, 46, 0.8);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #00d4aa;
      font-family: 'Courier New', monospace;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="scene-canvas"></canvas>
      <button id="toggle-day-night" title="切换昼夜">
        <svg id="sun-icon" viewBox="0 0 24 24" style="display: block;">
          <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
        <svg id="moon-icon" viewBox="0 0 24 24" style="display: none;">
          <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
      </button>
      <div class="fps-counter" id="fps-counter">FPS: --</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
