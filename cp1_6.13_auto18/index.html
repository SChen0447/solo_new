<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>空间规划 - 3D室内设计预览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-panel: rgba(22, 33, 62, 0.75);
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --accent: #0f3460;
      --accent-light: #1a5276;
      --highlight: #4fc3f7;
      --highlight-glow: rgba(79, 195, 247, 0.35);
      --border: rgba(255, 255, 255, 0.08);
      --glass-bg: rgba(22, 33, 62, 0.6);
      --glass-blur: 10px;
      --transition-speed: 0.2s;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
      color: var(--text-primary);
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #scene-container {
      position: relative;
      flex: 0 0 70%;
      height: 100%;
      overflow: hidden;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .scene-overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .view-btn {
      padding: 8px 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition-speed) ease;
      user-select: none;
    }

    .view-btn:hover {
      background: var(--accent-light);
      color: var(--text-primary);
    }

    .view-btn.active {
      background: var(--accent);
      color: var(--highlight);
      border-color: var(--highlight);
      box-shadow: 0 0 12px var(--highlight-glow);
    }

    .fps-counter {
      position: absolute;
      bottom: 16px;
      left: 16px;
      padding: 4px 10px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-secondary);
      z-index: 10;
      pointer-events: none;
    }

    #panel-container {
      flex: 0 0 30%;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-left: 1px solid var(--border);
      position: relative;
      transition: flex-basis 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #panel-container.collapsed {
      flex-basis: 0%;
      overflow: hidden;
      border-left: none;
    }

    #panel-toggle {
      position: absolute;
      left: -36px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 64px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 8px 0 0 8px;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-speed) ease;
      z-index: 20;
    }

    #panel-toggle:hover {
      background: var(--accent-light);
      color: var(--text-primary);
    }

    .panel-content {
      padding: 20px 16px;
      min-width: 260px;
    }

    .panel-section {
      margin-bottom: 24px;
    }

    .panel-section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .furniture-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .furniture-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-speed) ease;
      user-select: none;
    }

    .furniture-card:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .furniture-card.selected {
      border-color: var(--highlight);
      box-shadow: 0 0 16px var(--highlight-glow);
    }

    .furniture-icon {
      font-size: 28px;
      margin-bottom: 6px;
      display: block;
    }

    .furniture-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .slider-group {
      margin-bottom: 14px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .slider-value {
      color: var(--highlight);
      font-weight: 500;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--highlight);
      cursor: pointer;
      transition: transform var(--transition-speed) ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--highlight);
      cursor: pointer;
      border: none;
    }

    .action-btn {
      width: 100%;
      padding: 10px 16px;
      background: var(--accent);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: all var(--transition-speed) ease;
      margin-bottom: 8px;
    }

    .action-btn:hover {
      background: var(--accent-light);
      border-color: var(--highlight);
    }

    .action-btn.primary {
      background: var(--highlight);
      color: var(--bg-primary);
      font-weight: 600;
    }

    .action-btn.primary:hover {
      background: #29b6f6;
    }

    .hint-text {
      font-size: 11px;
      color: var(--text-secondary);
      opacity: 0.7;
      margin-top: 4px;
    }

    .crosshair-cursor {
      cursor: crosshair !important;
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
      }

      #scene-container {
        flex: 0 0 60%;
        width: 100%;
      }

      #panel-container {
        flex: 0 0 40%;
        width: 100%;
        border-left: none;
        border-top: 1px solid var(--border);
      }

      #panel-container.collapsed {
        flex-basis: 0%;
      }

      #panel-toggle {
        left: 50%;
        top: -36px;
        transform: translateX(-50%);
        width: 64px;
        height: 36px;
        border-radius: 8px 8px 0 0;
        border: 1px solid var(--border);
        border-bottom: none;
      }

      .furniture-grid {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .panel-content {
        min-width: unset;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container">
      <canvas id="canvas"></canvas>
      <div class="scene-overlay">
        <button class="view-btn active" data-view="free">自由漫游</button>
        <button class="view-btn" data-view="top">俯视图</button>
        <button class="view-btn" data-view="front">前视图</button>
        <button class="view-btn" data-view="side">侧视图</button>
      </div>
      <div class="fps-counter" id="fps-counter">FPS: --</div>
    </div>

    <div id="panel-container">
      <button id="panel-toggle">◀</button>
      <div class="panel-content">
        <div class="panel-section">
          <div class="panel-section-title">家具列表</div>
          <div class="furniture-grid" id="furniture-list">
            <div class="furniture-card" data-furniture="sofa">
              <span class="furniture-icon">🛋️</span>
              <span class="furniture-label">沙发</span>
            </div>
            <div class="furniture-card" data-furniture="table">
              <span class="furniture-icon">🪑</span>
              <span class="furniture-label">桌子</span>
            </div>
            <div class="furniture-card" data-furniture="chair">
              <span class="furniture-icon">💺</span>
              <span class="furniture-label">椅子</span>
            </div>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-section-title">光照控制</div>
          <div class="slider-group">
            <div class="slider-label">
              <span>方位角</span>
              <span class="slider-value" id="azimuth-value">45°</span>
            </div>
            <input type="range" id="light-azimuth" min="0" max="360" value="45" step="1" />
          </div>
          <div class="slider-group">
            <div class="slider-label">
              <span>仰角</span>
              <span class="slider-value" id="elevation-value">45°</span>
            </div>
            <input type="range" id="light-elevation" min="0" max="90" value="45" step="1" />
          </div>
          <div class="slider-group">
            <div class="slider-label">
              <span>阴影柔和度</span>
              <span class="slider-value" id="shadow-value">50%</span>
            </div>
            <input type="range" id="shadow-softness" min="0" max="100" value="50" step="1" />
          </div>
          <div class="slider-group">
            <div class="slider-label">
              <span>光照强度</span>
              <span class="slider-value" id="intensity-value">1.0</span>
            </div>
            <input type="range" id="light-intensity" min="0" max="200" value="100" step="1" />
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-section-title">操作</div>
          <button class="action-btn" id="btn-delete">删除选中家具</button>
          <button class="action-btn primary" id="btn-export">导出截图 (1920×1080)</button>
          <p class="hint-text">按 R 键进入旋转模式 | 鼠标拖拽移动家具</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
