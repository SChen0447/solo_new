<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Music Particle Fountain</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;

      html, body {
