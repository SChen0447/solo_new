<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 星云探索器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0B0C10;
      color: #E0E0E0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .particle-tooltip {
      position: fixed;
      background: rgba(15, 17, 26, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #3A3F47;
      border-radius: 8px;
      padding: 12px 16px;
      color: #E0E0E0;
      font-size: 13px;
      pointer-events: none;
      z-index: 1000;
      transform: scale(0);
      transform-origin: center;
      transition: transform 0.15s ease-out;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .particle-tooltip.visible {
      transform: scale(1);
    }

    .particle-tooltip .label {
      color: #7C4DFF;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .particle-tooltip .row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin: 4px 0;
    }

    .particle-tooltip .value {
      font-family: 'Consolas', monospace;
      color: #FFD700;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div class="particle-tooltip" id="particle-tooltip"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
