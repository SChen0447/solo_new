<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市交通流量可视化系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #1a2744 0%, #0d1526 100%);
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #chart-overlay {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 380px;
      height: 220px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    #chart-overlay.hidden {
      display: none;
    }

    #chart-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e0e8ff;
    }

    #chart-stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      color: #8899bb;
      font-size: 11px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #4fc3f7;
    }

    .stat-value.congested {
      color: #ef5350;
    }

    #chart-svg {
      width: 100%;
      height: 130px;
    }
