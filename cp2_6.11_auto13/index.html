<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>像素平台跳跃关卡编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #2a2a2a;
      font-family: 'Courier New', Consolas, monospace;
      color: #e0e0e0;
      min-width: 1024px;
      min-height: 600px;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
    }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }
    .toast.success {
      background: #28a745;
      color: #fff;
    }
    .toast.error {
      background: #dc3545;
      color: #fff;
    }
    .toast.info {
      background: #17a2b8;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas"></canvas>
  </div>
  <script type="module" src="/src/editor.ts"></script>
</body>
</html>
