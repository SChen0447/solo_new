<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三维星系演化模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #000;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #001835 0%, #000814 50%, #000008 100%);
    }

    #control-panel {
      position: fixed;
      top: 24px;
      left: 24px;
      width: 280px;
      z-index: 100;
    }

    .bg-stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .bg-stars::before,
    .bg-stars::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(1px 1px at 20px 30px, #ffffff, transparent),
        radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 50px 160px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 90px 40px, #ffffff, transparent),
        radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 160px 120px, #ffffff, transparent),
        radial-gradient(1px 1px at 200px 50px, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 250px 180px, #ffffff, transparent),
        radial-gradient(1px 1px at 300px 90px, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 350px 150px, #ffffff, transparent);
      background-size: 400px 200px;
      animation: twinkle 4s ease-in-out infinite alternate;
    }

    .bg-stars::after {
      background-size: 500px 300px;
      animation-duration: 6s;
      animation-delay: 1s;
      opacity: 0.6;
    }

    @keyframes twinkle {
      0% { opacity: 0.3; }
      100% { opacity: 0.8; }
    }

    @media (max-width: 1024px) {
      #control-panel {
        width: 240px;
        top: 16px;
        left: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-stars"></div>
  <div id="canvas-container"></div>
  <div id="control-panel"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
