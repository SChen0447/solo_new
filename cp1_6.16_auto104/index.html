<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Airflow Field Visualizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #stats-panel {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 20;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 14px;
      color: #e0e0e0;
      background: rgba(30, 30, 30, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 8px;
      padding: 10px 14px;
      line-height: 1.6;
      pointer-events: none;
      user-select: none;
    }

    #control-panel {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 20;
      background: rgba(30, 30, 30, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 0;
      pointer-events: auto;
      min-width: 280px;
      max-width: 320px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #control-panel.collapsed {
      transform: translateX(calc(100% + 16px));
      opacity: 0;
    }

    #panel-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 21;
      width: 44px;
      height: 44px;
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      color: #e0e0e0;
      font-size: 20px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    #panel-toggle:hover {
      background: rgba(50, 50, 50, 0.95);
      transform: scale(1.05);
    }

    #panel-toggle.active {
      display: flex;
    }

    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: move;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      user-select: none;
    }

    #panel-header h3 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #b0b0b0;
    }

    #panel-collapse-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      line-height: 1;
      transition: color 0.15s ease;
    }

    #panel-collapse-btn:hover {
      color: #e0e0e0;
    }

    #panel-body {
      padding: 8px 12px 12px;
      max-height: 60vh;
      overflow-y: auto;
    }

    #panel-body::-webkit-scrollbar {
      width: 4px;
    }

    #panel-body::-webkit-scrollbar-track {
      background: transparent;
    }

    #panel-body::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
    }

    .lil-gui {
      --background-color: transparent !important;
      --text-color: #e0e0e0 !important;
      --title-background-color: rgba(255, 255, 255, 0.04) !important;
      --title-text-color: #b0b0b0 !important;
      --widget-color: rgba(255, 255, 255, 0.08) !important;
      --hover-color: rgba(255, 255, 255, 0.14) !important;
      --focus-color: rgba(255, 255, 255, 0.18) !important;
      --number-color: #4fc3f7 !important;
      --string-color: #81c784 !important;
      --font-family: inherit !important;
      --font-size: 12px !important;
      width: 100% !important;
    }

    .lil-gui .title {
      transition: background 0.15s ease;
    }

    .lil-gui input[type="checkbox"] {
      accent-color: #4fc3f7;
    }

    .lil-gui select,
    .lil-gui input {
      transition: background 0.15s ease;
    }

    .lil-gui .controller:hover .widget {
      background: rgba(255, 255, 255, 0.12) !important;
    }

    @media (max-width: 768px) {
      #control-panel {
        min-width: 260px;
        max-width: 280px;
      }

      #panel-toggle.active {
        display: flex;
      }

      #control-panel.collapsed {
        transform: translateX(calc(100% + 20px));
      }
    }

    #hover-tooltip {
      position: fixed;
      z-index: 30;
      pointer-events: none;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.5;
      color: #e0e0e0;
      display: none;
      white-space: nowrap;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #4fc3f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="ui-overlay"></div>

  <div id="stats-panel">
    <div id="fps-display">FPS: --</div>
    <div id="particle-count-display">Particles: --</div>
  </div>

  <div id="control-panel">
    <div id="panel-header">
      <h3>Airflow Controls</h3>
      <button id="panel-collapse-btn">&#x2715;</button>
    </div>
    <div id="panel-body"></div>
  </div>

  <button id="panel-toggle">&#9881;</button>

  <div id="hover-tooltip"></div>

  <div class="loading-overlay" id="loading">
    <div class="loading-spinner"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
