<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D 平台跳跃关卡编辑器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #2C2C2C; font-family: 'Segoe UI', Arial, sans-serif; }
    #app { width: 100%; height: 100%; display: flex; flex-direction: column; }
    #topBar {
      height: 36px; background: #3A3A3A; display: flex; align-items: center;
      padding: 0 12px; gap: 16px; color: #CCC; font-size: 13px; flex-shrink: 0; z-index: 10;
    }
    #topBar .tool-name { color: #FFF; font-weight: 600; }
    #topBar .coords { color: #AAA; }
    #topBar .fps { color: #32CD32; font-weight: 600; }
    #topBar .spacer { flex: 1; }
    #testBtn {
      background: #4A6FA5; color: #FFF; border: none; padding: 4px 14px;
      border-radius: 4px; cursor: pointer; font-size: 13px; display: flex;
      align-items: center; gap: 4px; transition: background 0.1s, transform 0.05s;
    }
    #testBtn:hover { background: #3D5F8F; }
    #testBtn:active { transform: scale(0.95); }
    #mainArea { display: flex; flex: 1; overflow: hidden; }
    #toolbar {
      width: 60px; background: #2C2C2C; display: flex; flex-direction: column;
      align-items: center; padding: 8px 0; gap: 4px; flex-shrink: 0; z-index: 10;
      border-right: 1px solid #444;
    }
    .tool-btn {
      width: 48px; height: 48px; background: transparent; border: none;
      border-radius: 6px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: background 0.1s, transform 0.05s; position: relative;
    }
    .tool-btn:hover { background: rgba(255,255,255,0.08); }
    .tool-btn:active { transform: scale(0.92); }
    .tool-btn.active { background: #4A6FA5; }
    .tool-btn svg { width: 28px; height: 28px; fill: none; stroke: #FFF; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .tool-btn .tooltip {
      position: absolute; left: 58px; top: 50%; transform: translateY(-50%);
      background: #555; color: #FFF; padding: 3px 8px; border-radius: 4px;
      font-size: 12px; white-space: nowrap; pointer-events: none; opacity: 0;
      transition: opacity 0.15s;
    }
    .tool-btn:hover .tooltip { opacity: 1; }
    .tool-divider { width: 36px; height: 1px; background: #555; margin: 4px 0; }
    #canvasWrap { flex: 1; position: relative; overflow: hidden; }
    #gameCanvas { display: block; width: 100%; height: 100%; }
    #physicsPanel {
      position: absolute; left: 60px; bottom: 0; width: 220px;
      background: #2C2C2C; border-top-right-radius: 8px;
      border: 1px solid #444; border-bottom: none; border-left: none;
      overflow: hidden; z-index: 10;
    }
    #physicsToggle {
      width: 100%; padding: 8px 12px; background: #3A3A3A; border: none;
      color: #CCC; font-size: 12px; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 6px; transition: background 0.1s;
    }
    #physicsToggle:hover { background: #444; }
    #physicsToggle .arrow { transition: transform 0.3s; display: inline-block; }
    #physicsToggle.expanded .arrow { transform: rotate(90deg); }
    #physicsContent {
      max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
    }
    #physicsContent.expanded { max-height: 300px; }
    .param-row {
      display: flex; align-items: center; padding: 4px 12px; gap: 6px;
    }
    .param-row label { color: #AAA; font-size: 11px; width: 56px; flex-shrink: 0; }
    .param-row input[type=range] { flex: 1; height: 4px; accent-color: #4A6FA5; }
    .param-row .param-val { color: #007BFF; font-size: 11px; width: 36px; text-align: right; }
    #saveLoadBar {
      position: absolute; bottom: 8px; right: 8px; display: flex; gap: 6px; z-index: 10;
    }
    #saveLoadBar button {
      background: #4A6FA5; color: #FFF; border: none; padding: 6px 12px;
      border-radius: 4px; cursor: pointer; font-size: 12px;
      display: flex; align-items: center; gap: 4px; transition: background 0.1s, transform 0.05s;
    }
    #saveLoadBar button:hover { background: #3D5F8F; }
    #saveLoadBar button:active { transform: scale(0.95); }
    #modalOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center;
    }
    #modalOverlay.show { display: flex; }
    #modalBox {
      background: #3A3A3A; border-radius: 8px; padding: 20px; min-width: 400px;
      max-width: 600px; transform: scale(0); animation: modalPop 0.2s forwards;
      color: #DDD;
    }
    @keyframes modalPop { to { transform: scale(1); } }
    #modalBox h3 { margin-bottom: 12px; font-size: 16px; }
    #modalBox textarea {
      width: 100%; height: 200px; background: #2C2C2C; color: #EEE; border: 1px solid #555;
      border-radius: 4px; padding: 8px; font-family: monospace; font-size: 12px; resize: none;
    }
    #modalBox .modal-btns { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
    #modalBox .modal-btns button {
      padding: 6px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px;
      transition: background 0.1s, transform 0.05s;
    }
    #modalBox .modal-btns button:active { transform: scale(0.95); }
    .btn-primary { background: #4A6FA5; color: #FFF; }
    .btn-primary:hover { background: #3D5F8F; }
    .btn-secondary { background: #555; color: #DDD; }
    .btn-secondary:hover { background: #666; }
    #toast {
      position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
      padding: 8px 24px; border-radius: 4px; font-size: 14px; z-index: 200;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #toast.success { background: #28A745; color: #FFF; opacity: 1; }
    #toast.error { background: #DC3545; color: #FFF; opacity: 1; }
  </style>
</head>
<body>
  <div id="app">
    <div id="topBar">
      <span class="tool-name" id="toolName">地面</span>
      <span class="coords" id="coordsDisplay">X: 0 Y: 0</span>
      <span class="spacer"></span>
      <span class="fps" id="fpsDisplay">60 FPS</span>
      <button id="testBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
        <span>开始测试</span>
      </button>
    </div>
    <div id="mainArea">
      <div id="toolbar">
        <button class="tool-btn active" data-tool="ground">
          <svg viewBox="0 0 24 24"><rect x="3" y="14" width="18" height="7" rx="1"/><line x1="3" y1="14" x2="21" y2="14"/></svg>
          <span class="tooltip">地面</span>
        </button>
        <button class="tool-btn" data-tool="brick">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span class="tooltip">砖墙</span>
        </button>
        <button class="tool-btn" data-tool="spike">
          <svg viewBox="0 0 24 24"><polygon points="4,20 12,4 20,20" fill="none"/></svg>
          <span class="tooltip">尖刺</span>
        </button>
        <div class="tool-divider"></div>
        <button class="tool-btn" data-tool="coin">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><text x="12" y="16" text-anchor="middle" fill="#FFD700" stroke="none" font-size="10" font-weight="bold">$</text></svg>
          <span class="tooltip">金币</span>
        </button>
        <button class="tool-btn" data-tool="spring">
          <svg viewBox="0 0 24 24"><rect x="6" y="16" width="12" height="5" rx="1"/><path d="M9 16 L9 12 L15 12 L15 8 L9 8 L9 4"/></svg>
          <span class="tooltip">弹簧</span>
        </button>
        <div class="tool-divider"></div>
        <button class="tool-btn" data-tool="slime">
          <svg viewBox="0 0 24 24"><ellipse cx="12" cy="17" rx="8" ry="4"/><circle cx="9" cy="15" r="1.5" fill="#FFF" stroke="none"/><circle cx="15" cy="15" r="1.5" fill="#FFF" stroke="none"/></svg>
          <span class="tooltip">史莱姆</span>
        </button>
        <button class="tool-btn" data-tool="bat">
          <svg viewBox="0 0 24 24"><path d="M12 8 L6 4 L2 8 L6 10 L12 8 L18 10 L22 8 L18 4 Z"/><circle cx="10" cy="9" r="1" fill="#FFF" stroke="none"/><circle cx="14" cy="9" r="1" fill="#FFF" stroke="none"/></svg>
          <span class="tooltip">飞行蝙蝠</span>
        </button>
        <div class="tool-divider"></div>
        <button class="tool-btn" data-tool="eraser">
          <svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l9-9 8 8-4 5z"/><line x1="18" y1="13" x2="11" y2="6"/></svg>
          <span class="tooltip">橡皮擦</span>
        </button>
      </div>
      <div id="canvasWrap">
        <canvas id="gameCanvas"></canvas>
      </div>
    </div>
    <div id="physicsPanel">
      <button id="physicsToggle">
        <span class="arrow">▶</span> 物理参数
      </button>
      <div id="physicsContent">
        <div class="param-row">
          <label>重力</label>
          <input type="range" id="paramGravity" min="400" max="800" value="600" step="10">
          <span class="param-val" id="valGravity">600</span>
        </div>
        <div class="param-row">
          <label>跳跃力</label>
          <input type="range" id="paramJump" min="300" max="500" value="400" step="10">
          <span class="param-val" id="valJump">400</span>
        </div>
        <div class="param-row">
          <label>移动速度</label>
          <input type="range" id="paramSpeed" min="200" max="400" value="300" step="10">
          <span class="param-val" id="valSpeed">300</span>
        </div>
        <div class="param-row">
          <label>空气阻力</label>
          <input type="range" id="paramAirRes" min="0" max="100" value="0" step="1">
          <span class="param-val" id="valAirRes">0</span>
        </div>
        <div class="param-row">
          <label>跳跃次数</label>
          <input type="range" id="paramJumps" min="1" max="3" value="2" step="1">
          <span class="param-val" id="valJumps">2</span>
        </div>
      </div>
    </div>
    <div id="saveLoadBar">
      <button id="saveBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="8" y="4" width="8" height="6"/><rect x="7" y="14" width="10" height="6" rx="1"/></svg>
        保存
      </button>
      <button id="loadBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        加载
      </button>
    </div>
    <div id="modalOverlay">
      <div id="modalBox">
        <h3 id="modalTitle">保存关卡</h3>
        <textarea id="modalTextarea" readonly></textarea>
        <div class="modal-btns">
          <button class="btn-secondary" id="modalCancel">关闭</button>
          <button class="btn-primary" id="modalConfirm">复制</button>
        </div>
      </div>
    </div>
    <div id="toast"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
