<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>数字宇宙 - 3D粒子编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #ffffff;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0d0d2a 100%);
    }

    #container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .control-panel {
      position: fixed;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
      width: 320px;
      padding: 24px;
      background: rgba(20, 20, 40, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(124, 124, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 100;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .panel-title {
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .panel-subtitle {
      font-size: 12px;
      color: rgba(180, 180, 220, 0.8);
      margin-bottom: 24px;
    }

    .slider-group {
      margin-bottom: 20px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      color: rgba(220, 220, 255, 0.9);
    }

    .slider-value {
      font-size: 12px;
      color: #7c7cff;
      font-weight: 500;
      background: rgba(124, 124, 255, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      min-width: 40px;
      text-align: center;
      transition: all 0.3s ease;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #3a3a5c;
      outline: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #7c7cff;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(124, 124, 255, 0.6);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #a0a0ff;
      transform: scale(1.15);
      box-shadow: 0 0 16px rgba(160, 160, 255, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #7c7cff;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(124, 124, 255, 0.6);
      transition: all 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #a0a0ff;
      transform: scale(1.15);
      box-shadow: 0 0 16px rgba(160, 160, 255, 0.8);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Segoe UI', sans-serif;
      color: #ffffff;
      background: rgba(124, 124, 255, 0.2);
      border: 1px solid rgba(124, 124, 255, 0.4);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: rgba(160, 160, 255, 0.3);
      border-color: #a0a0ff;
      color: #ffffff;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(160, 160, 255, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: rgba(124, 124, 255, 0.3);
    }

    .stats {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(124, 124, 255, 0.15);
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(180, 180, 220, 0.6);
    }

    .stats span strong {
      color: #7c7cff;
      font-weight: 600;
    }

    .mobile-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(124, 124, 255, 0.3);
      color: #7c7cff;
      font-size: 24px;
      cursor: pointer;
      z-index: 99;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .mobile-toggle:hover {
      background: rgba(124, 124, 255, 0.2);
    }

    @media (max-width: 768px) {
      .control-panel {
        top: auto;
        right: 0;
        left: 0;
        bottom: 0;
        transform: translateY(100%);
        width: 100%;
        border-radius: 20px 20px 0 0;
        padding: 20px;
        max-height: 70vh;
        overflow-y: auto;
      }

      .control-panel.open {
        transform: translateY(0);
      }

      .mobile-toggle {
        display: flex;
      }

      .mobile-toggle.open {
        bottom: calc(70vh - 10px);
        transform: translateX(-50%) rotate(180deg);
      }
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
