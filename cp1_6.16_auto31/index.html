<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D数据探索器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 280px;
      background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
      border-radius: 12px;
      padding: 20px;
      color: #ffffff;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    #control-panel h2 {
      font-size: 18px;
      margin-bottom: 20px;
      font-weight: 600;
      color: #e94560;
    }
    .control-group {
      margin-bottom: 20px;
    }
    .control-label {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
      color: #a0aec0;
    }
    .slider-value {
      display: inline-block;
      float: right;
      color: #e94560;
      font-weight: 600;
    }
    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #2d3748;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(233, 69, 96, 0.6);
      transition: transform 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }
    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(233, 69, 96, 0.6);
    }
    #reset-btn {
      width: 100%;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #e94560;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
    #reset-btn:hover {
      background-color: #ff5a75;
    }
    #reset-btn:active {
      transform: scale(0.98);
    }
    #data-count {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 20px;
      border-radius: 8px;
      color: #ffffff;
      font-size: 16px;
      z-index: 10;
      backdrop-filter: blur(5px);
    }
    #data-count span {
      color: #e94560;
      font-weight: 700;
    }
    #tooltip {
      position: absolute;
      background: #000000cc;
      border-radius: 8px;
      padding: 12px 16px;
      color: #ffffff;
      font-size: 14px;
      pointer-events: none;
      z-index: 100;
      display: none;
      line-height: 1.6;
      min-width: 180px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    }
    #tooltip .label {
      font-size: 16px;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 8px;
    }
    #tooltip .info-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }
    #tooltip .info-label {
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="control-panel">
      <h2>控制面板</h2>
      <div class="control-group">
        <label class="control-label">
          X轴筛选值
          <span class="slider-value" id="slider-value">-50</span>
        </label>
        <input type="range" id="filter-slider" min="-50" max="50" step="1" value="-50">
      </div>
      <div class="control-group">
        <button id="reset-btn">重置视图与数据</button>
      </div>
    </div>
    <div id="data-count">
      当前可见数据点：<span id="count-value">300</span> / 300
    </div>
    <div id="tooltip"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
