<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0e27" />
  <title>3D 音频粒子波形可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #e8e6ff;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      background: radial-gradient(ellipse at center, #1a1040 0%, #0a0e27 60%, #05060f 100%);
      background-attachment: fixed;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #app canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }

    .title-badge {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 2px;
      color: rgba(232, 230, 255, 0.85);
      pointer-events: none;
      z-index: 5;
    }

    .controls-panel {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 960px);
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hamburger-btn {
      display: none;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      color: #e8e6ff;
      border-radius: 10px;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      transition: filter 0.2s ease, background 0.2s ease;
      flex-shrink: 0;
    }

    .hamburger-btn:hover {
      filter: brightness(1.2);
      background: rgba(255, 255, 255, 0.14);
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      flex-wrap: nowrap;
      min-width: 0;
    }

    .ctrl-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      color: #e8e6ff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      transition: filter 0.2s ease, background 0.2s ease, transform 0.1s ease;
      white-space: nowrap;
    }

    .ctrl-btn:hover:not(:disabled) {
      filter: brightness(1.2);
      background: rgba(255, 255, 255, 0.14);
    }

    .ctrl-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .ctrl-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .ctrl-btn.primary {
      background: linear-gradient(135deg, rgba(124, 92, 255, 0.45), rgba(80, 180, 255, 0.35));
      border-color: rgba(160, 140, 255, 0.35);
    }

    .ctrl-btn .icon {
      font-size: 14px;
      line-height: 1;
      display: inline-block;
    }

    .file-label {
      font-size: 12px;
      color: rgba(232, 230, 255, 0.6);
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .time-label {
      font-size: 12px;
      color: rgba(232, 230, 255, 0.75);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      min-width: 40px;
      text-align: center;
    }

    .progress-bar {
      flex: 1;
      min-width: 0;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }

    .progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: linear-gradient(135deg, #9d80ff, #50b4ff);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(157, 128, 255, 0.6);
      transition: transform 0.15s ease;
    }

    .progress-bar::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .progress-bar::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: linear-gradient(135deg, #9d80ff, #50b4ff);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(157, 128, 255, 0.6);
    }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .volume-wrap .icon {
      font-size: 14px;
      color: rgba(232, 230, 255, 0.8);
    }

    .volume-slider {
      width: 90px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: #e8e6ff;
      border-radius: 50%;
      cursor: pointer;
    }

    .volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: #e8e6ff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    .volume-label {
      font-size: 12px;
      color: rgba(232, 230, 255, 0.7);
      min-width: 32px;
      text-align: right;
    }

    @media (max-width: 768px) {
      .title-badge {
        font-size: 12px;
        letter-spacing: 1px;
        top: 12px;
        padding: 6px 14px;
      }

      .controls-panel {
        bottom: 12px;
        width: calc(100vw - 24px);
        padding: 10px 12px;
        gap: 8px;
        flex-wrap: nowrap;
      }

      .hamburger-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .controls-row {
        position: absolute;
        left: 0;
        right: 0;
        bottom: calc(100% + 8px);
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 12px;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        transform: translateY(8px);
        opacity: 0;
        pointer-events: none;
        transition: transform 0.25s ease, opacity 0.25s ease;
      }

      .controls-row.open {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .progress-wrap {
        width: 100%;
      }

      .volume-wrap {
        width: 100%;
      }

      .volume-slider {
        flex: 1;
        width: auto;
      }

      .file-label {
        max-width: none;
        width: 100%;
        text-align: center;
      }

      .ctrl-btn {
        justify-content: center;
      }
    }

    @media (max-width: 768px) {
      .controls-panel .label {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title-badge">3D AUDIO VISUALIZER</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
