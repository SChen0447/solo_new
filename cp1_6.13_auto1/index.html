<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>名画拼图挑战</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #F5F0E6;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }
      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 18px;
        color: #5D4037;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading" id="loading">加载中...</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
