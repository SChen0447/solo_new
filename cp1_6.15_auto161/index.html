<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星际粒子时钟秀</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* 加载动画 */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s ease-out;
    }

    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-ring {
      width: 120px;
      height: 120px;
      border: 3px solid transparent;
      border-top: 3px solid #00bfff;
      border-right: 3px solid #8a2be2;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      box-shadow: 0 0 20px rgba(0, 191, 255, 0.5), inset 0 0 20px rgba(138, 43, 226, 0.3);
    }

    .loading-ring::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border: 2px solid transparent;
      border-top: 2px solid #8a2be2;
      border-left: 2px solid #00bfff;
      border-radius: 50%;
      animation: spin-reverse 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    .loading-text {
      margin-top: 30px;
      color: #00bfff;
      font-size: 14px;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(0, 191, 255, 0.8);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* 控制面板 */
    #control-panel {
      position: fixed;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 240px;
      padding: 20px;
      background: rgba(20, 20, 30, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      border: 1px solid rgba(0, 191, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 191, 255, 0.2);
      z-index: 100;
      color: #fff;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #00bfff;
      text-shadow: 0 0 8px rgba(0, 191, 255, 0.6);
      letter-spacing: 2px;
      text-align: center;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0, 191, 255, 0.2);
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #a0a0c0;
      margin-bottom: 8px;
    }

    .control-value {
      color: #00bfff;
      font-weight: 600;
      text-shadow: 0 0 6px rgba(0, 191, 255, 0.6);
      transition: all 0.1s ease;
      min-width: 45px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(0, 191, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #00bfff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px #00bfff;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px #00bfff, 0 0 25px rgba(0, 191, 255, 0.5);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #00bfff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px #00bfff;
      border: none;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px #00bfff, 0 0 25px rgba(0, 191, 255, 0.5);
    }

    /* 色相选择器 */
    .hue-picker {
      position: relative;
      width: 100%;
      height: 40px;
      margin-top: 8px;
    }

    .hue-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: linear-gradient(to right, 
        hsl(0, 100%, 50%),
        hsl(60, 100%, 50%),
        hsl(120, 100%, 50%),
        hsl(180, 100%, 50%),
        hsl(240, 100%, 50%),
        hsl(300, 100%, 50%),
        hsl(360, 100%, 50%)
      );
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 191, 255, 0.3);
    }

    .hue-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.5), 0 0 12px currentColor;
      pointer-events: none;
      transition: transform 0.1s ease;
    }

    .hue-thumb:hover {
      transform: translate(-50%, -50%) scale(1.15);
    }

    @media (max-width: 600px) {
      #control-panel {
        right: 10px;
        width: calc(100% - 20px);
        top: auto;
        bottom: 10px;
        transform: none;
        padding: 12px;
      }

      .control-group {
        margin-bottom: 10px;
      }
    }

    @media (max-width: 320px) {
      #control-panel {
        width: 300px;
        right: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-ring"></div>
    <div class="loading-text">LOADING</div>
  </div>

  <div id="canvas-container"></div>

  <div id="control-panel">
    <div class="panel-title">粒子控制</div>
    
    <div class="control-group">
      <div class="control-label">
        <span>粒子大小</span>
        <span class="control-value" id="size-value">3.0px</span>
      </div>
      <input type="range" id="size-slider" min="1" max="6" step="0.1" value="3">
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>发射速度</span>
        <span class="control-value" id="speed-value">1.0</span>
      </div>
      <input type="range" id="speed-slider" min="0.1" max="2.0" step="0.1" value="1">
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>色相偏移</span>
        <span class="control-value" id="hue-value">0°</span>
      </div>
      <div class="hue-picker" id="hue-picker">
        <div class="hue-ring" id="hue-ring"></div>
        <div class="hue-thumb" id="hue-thumb" style="left: 0%;"></div>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">
        <span>旋转速度</span>
        <span class="control-value" id="rotation-value">0.2</span>
      </div>
      <input type="range" id="rotation-slider" min="0" max="0.5" step="0.01" value="0.2">
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
