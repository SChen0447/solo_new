<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Sculpture - 3D沙盒雕塑工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #video-input {
      display: none;
    }
    .fallback-ui {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00fff5;
      text-align: center;
      z-index: 1000;
      padding: 40px;
      border: 1px solid rgba(0, 255, 245, 0.3);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
    }
    .fallback-ui h2 {
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(0, 255, 245, 0.5);
    }
    .fallback-ui button {
      padding: 12px 32px;
      background: transparent;
      border: 2px solid #00fff5;
      color: #00fff5;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    .fallback-ui button:hover {
      background: rgba(0, 255, 245, 0.1);
      box-shadow: 0 0 20px rgba(0, 255, 245, 0.4);
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <video id="video-input" playsinline></video>
    <div id="fallback" class="fallback-ui" style="display: none;">
      <h2>需要摄像头权限</h2>
      <p style="margin-bottom: 20px; color: #aaa;">请允许访问摄像头以使用手势识别功能</p>
      <button onclick="location.reload()">重新加载</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
