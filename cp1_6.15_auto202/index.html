<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Crystal Tower Performance Visualization</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: monospace;
    }

    body {
      background: radial-gradient(ellipse at center, #0a0a1a 0%, #1a1a2e 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #fps-display {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 48px;
      font-family: monospace;
      color: #cdd6f4;
      text-shadow: 0 0 20px rgba(205, 214, 244, 0.5);
      letter-spacing: 2px;
      pointer-events: none;
      transition: font-size 0.2s ease-out;
    }

    #fps-label {
      position: absolute;
      top: 85px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #6c7086;
      font-family: monospace;
    }

    #hover-label {
      position: absolute;
      width: 160px;
      padding: 12px 16px;
      background: rgba(30, 30, 46, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(69, 71, 90, 0.25);
      border-radius: 8px;
      color: #cdd6f4;
      font-size: 14px;
      font-family: monospace;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -120%);
      transition: opacity 0.2s ease-out;
      z-index: 100;
      text-align: center;
    }

    #hover-label .metric-name {
      font-size: 12px;
      color: #6c7086;
      margin-bottom: 4px;
    }

    #hover-label .metric-value {
      font-size: 18px;
      font-weight: bold;
    }

    #waveform-container {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s ease-out, transform 0.3s ease-out;
      z-index: 50;
    }

    #waveform-container.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #waveform-canvas {
      display: block;
      border-radius: 4px;
    }

    #timeline-container {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 800px;
      pointer-events: auto;
      transition: width 0.2s ease-out;
    }

    #timeline-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      color: #6c7086;
      font-family: monospace;
    }

    #timeline-scale {
      position: relative;
      height: 20px;
      margin-bottom: 8px;
    }

    .timeline-tick {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      font-size: 10px;
      color: #6c7086;
      font-family: monospace;
    }

    .timeline-tick::before {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      height: 8px;
      background: rgba(108, 112, 134, 0.3);
    }

    #timeline-slider {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(30, 30, 46, 0.8);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    #timeline-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #cba6f7;
      cursor: pointer;
      transform: rotate(45deg);
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(203, 166, 247, 0.5);
      transition: transform 0.2s ease-out;
    }

    #timeline-slider::-webkit-slider-thumb:hover {
      transform: rotate(45deg) scale(1.2);
    }

    #timeline-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #cba6f7;
      cursor: pointer;
      transform: rotate(45deg);
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(203, 166, 247, 0.5);
      border: none;
    }

    .glass-panel {
      background: rgba(30, 30, 46, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(69, 71, 90, 0.25);
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      #fps-display {
        font-size: 32px;
        top: 20px;
      }

      #fps-label {
        top: 60px;
        font-size: 12px;
      }

      #timeline-container {
        width: 90%;
        bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="ui-overlay">
      <div id="fps-display">0</div>
      <div id="fps-label">FPS</div>
      
      <div id="hover-label">
        <div class="metric-name"></div>
        <div class="metric-value"></div>
      </div>

      <div id="waveform-container" class="glass-panel">
        <canvas id="waveform-canvas" width="240" height="60"></canvas>
      </div>

      <div id="timeline-container">
        <div id="timeline-labels">
          <span>60秒前</span>
          <span>现在</span>
        </div>
        <div id="timeline-scale"></div>
        <input type="range" id="timeline-slider" min="0" max="100" value="100" />
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
