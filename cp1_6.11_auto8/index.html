<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粒子星云星图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #87CEEB;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .control-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(15, 25, 50, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(135, 206, 235, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .control-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .galaxy-name {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 2px;
    }

    .star-count {
      font-size: 13px;
      color: rgba(135, 206, 235, 0.8);
    }

    .star-count span {
      color: #ffffff;
      font-weight: 500;
    }

    .control-center {
      font-size: 13px;
      color: rgba(135, 206, 235, 0.7);
      letter-spacing: 1px;
    }

    .control-center span {
      color: rgba(255, 255, 255, 0.9);
      margin: 0 6px;
    }

    .control-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .view-mode-btn {
      padding: 8px 16px;
      border: 1px solid rgba(135, 206, 235, 0.3);
      border-radius: 20px;
      background: rgba(135, 206, 235, 0.08);
      color: rgba(135, 206, 235, 0.9);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      font-family: inherit;
    }

    .view-mode-btn:hover {
      background: rgba(135, 206, 235, 0.15);
      border-color: rgba(135, 206, 235, 0.5);
      color: #ffffff;
      transform: translateY(-1px);
    }

    .view-mode-btn.active {
      background: rgba(135, 206, 235, 0.25);
      border-color: rgba(135, 206, 235, 0.6);
      color: #ffffff;
    }

    .star-card {
      position: fixed;
      padding: 16px 20px;
      background: rgba(15, 25, 50, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(135, 206, 235, 0.3);
      border-radius: 10px;
      color: #ffffff;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 200;
      min-width: 200px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .star-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .star-card-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .star-card-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }

    .star-card-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .star-card-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .star-card-label {
      color: rgba(135, 206, 235, 0.7);
    }

    .star-card-value {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
    }

    .fps-counter {
      position: fixed;
      top: 16px;
      right: 24px;
      font-size: 12px;
      color: rgba(135, 206, 235, 0.6);
      z-index: 50;
      font-variant-numeric: tabular-nums;
    }

    .fps-counter span {
      color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="fps-counter">FPS: <span id="fps-value">60</span></div>

    <div class="star-card" id="star-card">
      <div class="star-card-name">
        <div class="star-card-dot" id="card-dot"></div>
        <span id="card-name">星体名称</span>
      </div>
      <div class="star-card-info">
        <div class="star-card-row">
          <span class="star-card-label">光谱类型</span>
          <span class="star-card-value" id="card-spectral">--</span>
        </div>
        <div class="star-card-row">
          <span class="star-card-label">亮度等级</span>
          <span class="star-card-value" id="card-brightness">--</span>
        </div>
        <div class="star-card-row">
          <span class="star-card-label">距离中心</span>
          <span class="star-card-value" id="card-distance">--</span>
        </div>
      </div>
    </div>

    <div class="control-bar">
      <div class="control-left">
        <div class="galaxy-name">✦ 螺旋星云 NCG-2024</div>
        <div class="star-count">星体数量: <span id="star-count">0</span></div>
      </div>
      <div class="control-center">
        鼠标 <span>拖拽旋转</span> · 滚轮 <span>缩放</span> · 悬停 <span>查看信息</span>
      </div>
      <div class="control-right">
        <button class="view-mode-btn active" id="view-mode-btn">自由视角</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
