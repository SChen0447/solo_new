<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <title>城市风环境模拟可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      min-width: 1024px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* 左侧编辑面板 */
    #left-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 280px;
      height: 100%;
      background: rgba(30, 30, 47, 0.75);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-right: 0.5px solid rgba(58, 58, 90, 0.6);
      z-index: 10;
      padding: 20px 16px;
      overflow-y: auto;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #left-panel::-webkit-scrollbar {
      width: 6px;
    }

    #left-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #left-panel::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 170, 0.3);
      border-radius: 3px;
    }

    #left-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 170, 0.5);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0, 212, 170, 0.2);
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #00d4aa;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: linear-gradient(180deg, #00d4aa, #00e5ff);
      border-radius: 2px;
    }

    .panel-icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      color: #aaa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      display: none;
    }

    .panel-icon-btn:hover {
      background: rgba(0, 212, 170, 0.15);
      color: #00d4aa;
      transform: scale(1.05);
    }

    .section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 500;
      color: #8888aa;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 100px;
      height: 42px;
      border-radius: 8px;
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.06);
      color: #ddd;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 212, 170, 0.15);
      border-color: rgba(0, 212, 170, 0.4);
      background: rgba(0, 212, 170, 0.1);
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
      transition: all 0.1s;
    }

    .btn-primary {
      background: #00d4aa;
      color: #0a0a15;
      border-color: #00d4aa;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #00e5bb;
      box-shadow: 0 8px 24px rgba(0, 212, 170, 0.4), 0 0 30px rgba(0, 212, 170, 0.3);
      filter: brightness(1.1);
    }

    .btn-danger {
      background: rgba(255, 107, 107, 0.15);
      color: #ff6b6b;
      border-color: rgba(255, 107, 107, 0.3);
    }

    .btn-danger:hover {
      background: rgba(255, 107, 107, 0.25);
      border-color: rgba(255, 107, 107, 0.5);
    }

    /* 滑块样式 */
    .slider-group {
      margin-bottom: 16px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .slider-label span:first-child {
      font-size: 12px;
      color: #aaaacc;
    }

    .slider-label .slider-value {
      font-size: 13px;
      font-weight: 600;
      color: #00d4aa;
      background: rgba(0, 212, 170, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      min-width: 50px;
      text-align: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4aa, #00e5ff);
      cursor: pointer;
      border: 3px solid #1a1a2e;
      box-shadow: 0 2px 8px rgba(0, 212, 170, 0.4);
      transition: all 0.1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 4px 12px rgba(0, 212, 170, 0.6);
    }

    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(1.1);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4aa, #00e5ff);
      cursor: pointer;
      border: 3px solid #1a1a2e;
      box-shadow: 0 2px 8px rgba(0, 212, 170, 0.4);
      transition: all 0.1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
    }

    /* 建筑列表 */
    .building-list {
      max-height: 200px;
      overflow-y: auto;
      border-radius: 8px;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      background: rgba(0, 0, 0, 0.2);
    }

    .building-list::-webkit-scrollbar {
      width: 4px;
    }

    .building-list::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 170, 0.3);
      border-radius: 2px;
    }

    .building-item {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .building-item:last-child {
      border-bottom: none;
    }

    .building-item:hover {
      background: rgba(0, 212, 170, 0.08);
    }

    .building-item.active {
      background: rgba(0, 212, 170, 0.15);
      border-left: 3px solid #00d4aa;
    }

    .building-item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .building-item-name {
      font-size: 12px;
      font-weight: 500;
      color: #ddd;
    }

    .building-item-dim {
      font-size: 10px;
      color: #8888aa;
    }

    .building-item-del {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(255, 107, 107, 0.1);
      color: #ff6b6b;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
      opacity: 0;
    }

    .building-item:hover .building-item-del {
      opacity: 1;
    }

    .building-item-del:hover {
      background: rgba(255, 107, 107, 0.25);
      transform: scale(1.1);
    }

    /* 右侧数据面板 */
    #right-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 320px;
      height: 100%;
      background: rgba(37, 37, 64, 0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-left: 0.5px solid rgba(58, 58, 90, 0.6);
      z-index: 10;
      padding: 20px 16px;
      overflow-y: auto;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #right-panel::-webkit-scrollbar {
      width: 6px;
    }

    #right-panel::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 170, 0.3);
      border-radius: 3px;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 0.5px solid rgba(58, 58, 90, 0.5);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      border-color: rgba(0, 212, 170, 0.3);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00d4aa;
      box-shadow: 0 0 8px #00d4aa;
    }

    /* 风速计 */
    .anemometer {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
    }

    .anemometer-value {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4aa, #00e5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .anemometer-unit {
      font-size: 14px;
      color: #8888aa;
      margin-top: 4px;
    }

    .anemometer-label {
      font-size: 11px;
      color: #666688;
      margin-top: 8px;
      letter-spacing: 2px;
    }

    /* 热力图 */
    .heatmap-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 0.5px solid rgba(0, 212, 170, 0.2);
    }

    #heatmap-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .heatmap-legend {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 10px;
      color: #8888aa;
    }

    .heatmap-legend-bar {
      flex: 1;
      height: 6px;
      margin: 0 10px;
      border-radius: 3px;
      background: linear-gradient(90deg, #1e3a8a, #3b82f6, #00d4aa, #f59e0b, #ef4444);
    }

    /* 折线图 */
    .chart-container {
      position: relative;
      width: 100%;
      height: 140px;
      border-radius: 8px;
      overflow: hidden;
    }

    #chart-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* 导出按钮 */
    .export-section {
      display: flex;
      justify-content: center;
      padding-top: 8px;
    }

    .btn-export {
      width: 120px;
      height: 42px;
      border-radius: 8px;
      background: #00d4aa;
      color: #0a0a15;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-export:hover {
      filter: brightness(1.1);
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 24px rgba(0, 212, 170, 0.4), 0 0 30px rgba(0, 212, 170, 0.2);
    }

    .btn-export:active {
      transform: translateY(0) scale(0.98);
      transition: all 0.1s;
    }

    /* 场景中叠加的风速计 */
    #anemometer-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
      transform: translate(-50%, -50%);
      letter-spacing: 1px;
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      html, body {
        min-width: auto;
      }

      #left-panel {
        width: 260px;
        transform: translateX(-100%);
      }

      #left-panel.open {
        transform: translateX(0);
      }

      #right-panel {
        width: 280px;
        transform: translateX(100%);
      }

      #right-panel.open {
        transform: translateX(0);
      }

      .panel-icon-btn {
        display: flex;
      }

      .mobile-toggle {
        position: fixed;
        bottom: 20px;
        z-index: 100;
        display: flex;
        gap: 12px;
        width: 100%;
        justify-content: center;
      }

      .mobile-toggle .toggle-btn {
        padding: 10px 20px;
        border-radius: 20px;
        background: rgba(30, 30, 47, 0.9);
        border: 0.5px solid rgba(0, 212, 170, 0.4);
        color: #00d4aa;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        backdrop-filter: blur(10px);
      }
    }

    @media (min-width: 769px) {
      .mobile-toggle {
        display: none;
      }
    }

    /* 提示信息 */
    #toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      padding: 12px 24px;
      background: rgba(30, 30, 47, 0.95);
      border: 0.5px solid rgba(0, 212, 170, 0.4);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      z-index: 1000;
      backdrop-filter: blur(20px);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #toast.success {
      border-color: rgba(0, 212, 170, 0.6);
      color: #00d4aa;
    }

    #toast.error {
      border-color: rgba(255, 107, 107, 0.6);
      color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="anemometer-overlay">0.0 m/s</div>

    <!-- 左侧编辑面板 -->
    <div id="left-panel">
      <div class="panel-header">
        <div class="panel-title">建筑编辑</div>
        <button class="panel-icon-btn" id="left-close-btn">✕</button>
      </div>

      <div class="section">
        <div class="section-title">操作工具</div>
        <div class="btn-group">
          <button class="btn btn-primary" id="btn-add-building">
            <span>＋</span> 添加建筑
          </button>
          <button class="btn" id="btn-select-mode">
            <span>↖</span> 选择
          </button>
          <button class="btn" id="btn-move-mode">
            <span>✥</span> 移动
          </button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">建筑尺寸</div>
        <div class="slider-group">
          <div class="slider-label">
            <span>宽度 (X轴)</span>
            <span class="slider-value" id="width-value">15 m</span>
          </div>
          <input type="range" id="width-slider" min="5" max="30" step="1" value="15" />
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span>高度 (Y轴)</span>
            <span class="slider-value" id="height-value">30 m</span>
          </div>
          <input type="range" id="height-slider" min="3" max="100" step="1" value="30" />
        </div>
        <div class="slider-group">
          <div class="slider-label">
            <span>深度 (Z轴)</span>
            <span class="slider-value" id="depth-value">15 m</span>
          </div>
          <input type="range" id="depth-slider" min="5" max="30" step="1" value="15" />
        </div>
      </div>

      <div class="section">
        <div class="section-title">风场设置</div>
        <div class="slider-group">
          <div class="slider-label">
            <span>基础风速</span>
            <span class="slider-value" id="wind-speed-value">5.0 m/s</span>
          </div>
          <input type="range" id="wind-speed-slider" min="1" max="20" step="0.1" value="5" />
        </div>
      </div>

      <div class="section">
        <div class="section-title">建筑列表</div>
        <div class="building-list" id="building-list"></div>
      </div>
    </div>

    <!-- 右侧数据面板 -->
    <div id="right-panel">
      <div class="panel-header">
        <div class="panel-title">数据分析</div>
        <button class="panel-icon-btn" id="right-close-btn">✕</button>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="card-title-dot"></span>实时风速</div>
        </div>
        <div class="anemometer">
          <div class="anemometer-value" id="current-speed">5.0</div>
          <div class="anemometer-unit">m/s</div>
          <div class="anemometer-label">MEASURED AT CENTER</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="card-title-dot" style="background:#3b82f6;box-shadow:0 0 8px #3b82f6"></span>风速热力图</div>
        </div>
        <div class="heatmap-container">
          <canvas id="heatmap-canvas" width="260" height="260"></canvas>
        </div>
        <div class="heatmap-legend">
          <span>低</span>
          <div class="heatmap-legend-bar"></div>
          <span>高</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title"><span class="card-title-dot" style="background:#f59e0b;box-shadow:0 0 8px #f59e0b"></span>风速变化趋势</div>
        </div>
        <div class="chart-container">
          <canvas id="chart-canvas" width="260" height="140"></canvas>
        </div>
      </div>

      <div class="export-section">
        <button class="btn-export" id="btn-export">
          导出当前布局
        </button>
      </div>
    </div>

    <!-- 移动端切换按钮 -->
    <div class="mobile-toggle">
      <button class="toggle-btn" id="toggle-left">◀ 编辑面板</button>
      <button class="toggle-btn" id="toggle-right">分析面板 ▶</button>
    </div>

    <div id="toast"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
