<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 知识图谱</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a0a2e 100%);
    }
    canvas {
      display: block;
    }
    .ui-overlay {
      position: fixed;
      pointer-events: none;
      z-index: 10;
    }
    .ui-overlay > * {
      pointer-events: auto;
    }
    .node-count {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      color: #cccccc;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .node-count span {
      color: #00ff88;
      font-weight: 600;
      margin-left: 8px;
    }
    .reset-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cccccc;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reset-btn:hover {
      background: rgba(255, 255, 255, 0.9);
      color: #1a0a2e;
      transform: scale(1.05);
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: rgba(30, 30, 60, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 28px;
      width: 360px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.2s ease;
    }
    .modal-overlay.active .modal {
      transform: translateY(0);
      opacity: 1;
    }
    .modal h3 {
      color: #ffffff;
      font-size: 18px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      color: #cccccc;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .form-group input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input[type="text"]:focus {
      border-color: #00ff88;
    }
    .color-picker {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }
    .color-option {
      aspect-ratio: 1;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .color-option:hover {
      transform: scale(1.1);
    }
    .color-option.selected {
      border-color: #ffffff;
      transform: scale(1.1);
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00ff88, #0088ff);
      color: #ffffff;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #cccccc;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    .hint-text {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 8px;
      color: #8888aa;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <div class="node-count ui-overlay">
    节点总数<span id="nodeCount">0</span>
  </div>
  
  <button class="reset-btn ui-overlay" id="resetBtn" title="重置视角">R</button>
  
  <div class="hint-text">
    点击空白处添加节点 · 拖拽节点创建连线 · F键聚焦 · Delete键删除
  </div>
  
  <div class="modal-overlay" id="addNodeModal">
    <div class="modal">
      <h3>添加节点</h3>
      <div class="form-group">
        <label for="nodeName">节点名称</label>
        <input type="text" id="nodeName" maxlength="20" placeholder="请输入节点名称（最多20字）" />
      </div>
      <div class="form-group">
        <label>节点颜色</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="confirmBtn">确认</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
