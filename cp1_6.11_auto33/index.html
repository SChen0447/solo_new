<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D 粒子星系生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #e0e0ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #hamburger {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      transition: transform 0.2s ease;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
    }

    #hamburger:hover {
      transform: scale(1.05);
    }

    #hamburger span {
      width: 22px;
      height: 2px;
      background: #e0e0ff;
      border-radius: 1px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    #hamburger.active span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    #hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    #hamburger.active span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    #ui-layer {
      position: absolute;
      top: 0;
      right: 0;
      width: 320px;
      height: 100%;
      z-index: 100;
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-left: 1px solid rgba(108, 92, 231, 0.3);
      overflow-y: auto;
      transition: transform 0.3s ease;
    }

    #ui-layer::-webkit-scrollbar {
      width: 6px;
    }

    #ui-layer::-webkit-scrollbar-track {
      background: transparent;
    }

    #ui-layer::-webkit-scrollbar-thumb {
      background: rgba(108, 92, 231, 0.5);
      border-radius: 3px;
    }

    .panel-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(108, 92, 231, 0.2);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .panel-subtitle {
      font-size: 12px;
      color: #8888aa;
      margin-top: 4px;
    }

    .panel-section {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(108, 92, 231, 0.15);
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #6c5ce7;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #c0c0e0;
      margin-bottom: 8px;
    }

    .control-value {
      font-size: 12px;
      color: #6c5ce7;
      font-weight: 600;
      background: rgba(108, 92, 231, 0.15);
      padding: 2px 8px;
      border-radius: 4px;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(108, 92, 231, 0.2);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      accent-color: #6c5ce7;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6c5ce7;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(108, 92, 231, 0.6);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 14px rgba(108, 92, 231, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6c5ce7;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(108, 92, 231, 0.6);
    }

    select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(10, 10, 30, 0.6);
      border: 1px solid rgba(108, 92, 231, 0.3);
      border-radius: 8px;
      color: #e0e0ff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s ease;
    }

    select:focus {
      border-color: #6c5ce7;
    }

    select option {
      background: #1a1a3a;
      color: #e0e0ff;
    }

    .radio-group {
      display: flex;
      gap: 8px;
    }

    .radio-btn {
      flex: 1;
      padding: 10px 8px;
      background: rgba(10, 10, 30, 0.6);
      border: 1px solid rgba(108, 92, 231, 0.3);
      border-radius: 8px;
      color: #8888aa;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .radio-btn:hover {
      border-color: rgba(108, 92, 231, 0.6);
      color: #c0c0e0;
    }

    .radio-btn.active {
      background: rgba(108, 92, 231, 0.25);
      border-color: #6c5ce7;
      color: #fff;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
      margin-bottom: 10px;
    }

    .btn:last-child {
      margin-bottom: 0;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
      color: #fff;
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(108, 92, 231, 0.6);
    }

    .btn-secondary {
      background: rgba(108, 92, 231, 0.2);
      color: #c0c0e0;
      border: 1px solid rgba(108, 92, 231, 0.4);
    }

    .btn-secondary:hover {
      background: rgba(108, 92, 231, 0.3);
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn-row .btn {
      flex: 1;
    }

    .color-preview {
      display: flex;
      height: 20px;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .color-preview div {
      flex: 1;
    }

    .fps-counter {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 8px 14px;
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      font-size: 12px;
      color: #6c5ce7;
      font-weight: 600;
      z-index: 50;
      font-family: 'Courier New', monospace;
    }

    @media (max-width: 768px) {
      #hamburger {
        display: flex;
      }

      #ui-layer {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        height: 75vh;
        border-left: none;
        border-top: 1px solid rgba(108, 92, 231, 0.3);
        border-radius: 20px 20px 0 0;
        transform: translateY(100%);
      }

      #ui-layer.open {
        transform: translateY(0);
      }

      .fps-counter {
        top: 20px;
        left: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div class="fps-counter" id="fps-counter">FPS: --</div>
    <button id="hamburger" aria-label="打开控制面板">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div id="ui-layer"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
