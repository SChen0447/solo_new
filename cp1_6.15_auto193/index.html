<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星际粒子生命树</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
    }
    #app {
      width: 100%;
      height: 100%;
    }
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #ui-container > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="ui-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
