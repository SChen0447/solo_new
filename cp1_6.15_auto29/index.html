<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 产品展厅 | 手势交互配置系统</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <video
      id="webcam"
      style="position: fixed; top: 16px; left: 16px; width: 200px; height: 150px; object-fit: cover; border-radius: 8px; transform: scaleX(-1); z-index: 100; border: 2px solid #00ccff; display: none;"
      autoplay
      muted
      playsinline
    ></video>
    <canvas
      id="gesture-canvas"
      style="position: fixed; top: 16px; left: 16px; width: 200px; height: 150px; z-index: 101; pointer-events: none; display: none;"
    ></canvas>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
