<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D分子结构可视化工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
    }
    
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      animation: fadeIn 2s ease-in forwards;
    }
    
    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
    
    #panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 280px;
      padding: 20px;
      background: rgba(26, 26, 58, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 12px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      color: #ffffff;
      z-index: 100;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }
    
    #panel h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #ffffff;
      font-weight: 600;
    }
    
    .panel-section {
      margin-bottom: 20px;
    }
    
    .panel-section:last-child {
      margin-bottom: 0;
    }
    
    .panel-label {
      display: block;
      font-size: 12px;
      color: #aaaaaa;
      margin-bottom: 8px;
    }
    
    .btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
      margin-bottom: 8px;
    }
    
    .btn:hover {
      background: #66BB6A;
      transform: translateY(-1px);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    #file-input {
      display: none;
    }
    
    .slider-group {
      margin-bottom: 12px;
    }
    
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    
    .slider-label {
      font-size: 12px;
      color: #cccccc;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .element-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    
    .slider-value {
      font-size: 12px;
      color: #888888;
      min-width: 35px;
      text-align: right;
    }
    
    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    input[type="range"]::-webkit-slider-thumb:hover {
      background: #66BB6A;
      transform: scale(1.1);
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4CAF50;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }
    
    input[type="range"]::-moz-range-thumb:hover {
      background: #66BB6A;
      transform: scale(1.1);
    }
    
    .status-text {
      font-size: 11px;
      color: #888888;
      margin-top: 8px;
    }
    
    .atom-label {
      position: absolute;
      color: white;
      font-size: 10px;
      font-weight: 300;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
      transition: opacity 0.5s ease;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    #labels-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="labels-container"></div>
    <div id="panel">
      <h2>3D分子可视化</h2>
      
      <div class="panel-section">
        <label class="panel-label">加载分子文件</label>
        <input type="file" id="file-input" accept=".txt,.sdf,.mol">
        <button class="btn" id="load-btn">选择分子文件</button>
        <button class="btn" id="reset-btn">重置视角</button>
        <button class="btn" id="demo-btn">加载示例分子</button>
        <div class="status-text" id="status-text">请加载包含原子坐标和键信息的文件</div>
      </div>
      
      <div class="panel-section">
        <label class="panel-label">原子筛选（透明度）</label>
        <div id="sliders-container"></div>
      </div>
      
      <div class="panel-section">
        <label class="panel-label">操作说明</label>
        <div class="status-text">
          • 左键拖拽：旋转视角<br>
          • 右键拖拽：平移视角<br>
          • 滚轮：缩放视图<br>
          • 点击原子：高亮显示
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
