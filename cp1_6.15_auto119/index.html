<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Arcade Racing</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0d1b2a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }
    #gameCanvas {
      border: 4px solid #333;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
    }
    .instructions {
      position: absolute;
      bottom: 20px;
      color: #9e9e9e;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="900" height="700"></canvas>
  <div class="instructions">WASD - 控制赛车 | R - 重新生成赛道</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
