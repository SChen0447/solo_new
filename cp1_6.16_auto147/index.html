<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>板块构造与地形演变模拟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A1A;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #E0E0E0;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
    }
    #scene-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #scene-container canvas {
      display: block;
    }
    #altitude-tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(30,30,30,0.9);
      color: #E0E0E0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
      z-index: 10;
      border: 1px solid #FF6B35;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container">
      <div id="altitude-tooltip"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
