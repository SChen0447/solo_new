<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MolView - 三维分子结构浏览器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0f1a;
      --bg-secondary: #111827;
      --glass-bg: rgba(15, 23, 42, 0.65);
      --glass-border: rgba(79, 195, 247, 0.15);
      --glass-border-hover: rgba(79, 195, 247, 0.35);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-accent: #4fc3f7;
      --accent-blue: #4fc3f7;
      --accent-blue-dark: #0288d1;
      --accent-glow: rgba(79, 195, 247, 0.4);
      --danger: #f87171;
      --success: #4ade80;
      --warning: #fbbf24;
      --font-mono: 'JetBrains Mono', monospace;
      --font-ui: 'Outfit', sans-serif;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-ui);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #viewport-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #viewport-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #viewport-left, #viewport-right {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
    }

    #viewport-left {
      left: 0;
    }

    #viewport-right {
      right: 0;
    }

    .compare-active #viewport-left,
    .compare-active #viewport-right {
      width: 50%;
    }

    .compare-active #viewport-right {
      border-left: 1px solid var(--glass-border);
    }

    .compare-divider {
      display: none;
      position: absolute;
      top: 0;
      left: 50%;
      width: 2px;
      height: 100%;
      background: linear-gradient(180deg, transparent, var(--accent-blue), transparent);
      z-index: 10;
      pointer-events: none;
    }

    .compare-active .compare-divider {
      display: block;
    }

    .compare-label {
      display: none;
      position: absolute;
      top: 16px;
      padding: 4px 14px;
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-accent);
      z-index: 11;
      letter-spacing: 0.5px;
    }

    .compare-active .compare-label {
      display: block;
    }

    #label-left { left: 16px; }
    #label-right { right: 16px; }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
    }

    #control-bar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: var(--radius-lg);
      z-index: 20;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    #control-bar .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      user-select: none;
    }

    #control-bar .btn:hover {
      background: rgba(79, 195, 247, 0.1);
      border-color: var(--glass-border-hover);
      color: var(--text-primary);
    }

    #control-bar .btn.active {
      background: rgba(79, 195, 247, 0.15);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      box-shadow: 0 0 12px rgba(79, 195, 247, 0.15);
    }

    #control-bar .btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #control-bar .separator {
      width: 1px;
      height: 24px;
      background: var(--glass-border);
      margin: 0 4px;
    }

    #control-bar .file-input {
      display: none;
    }

    #info-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 280px;
      padding: 16px;
      border-radius: var(--radius-lg);
      z-index: 20;
      opacity: 0;
      transform: translateX(12px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
    }

    #info-panel.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    #info-panel .panel-title {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-accent);
      margin-bottom: 12px;
    }

    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(79, 195, 247, 0.08);
    }

    #info-panel .info-row:last-child {
      border-bottom: none;
    }

    #info-panel .info-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    #info-panel .info-value {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      font-weight: 600;
    }

    #info-panel .neighbor-list {
      margin-top: 10px;
    }

    #info-panel .neighbor-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      margin: 3px 0;
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    #info-panel .neighbor-element {
      color: var(--accent-blue);
    }

    #info-panel .neighbor-distance {
      color: var(--text-secondary);
    }

    #hover-label {
      position: absolute;
      pointer-events: none;
      padding: 4px 10px;
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--accent-blue);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent-blue);
      z-index: 30;
      opacity: 0;
      transition: opacity 0.15s ease;
      white-space: nowrap;
      box-shadow: 0 0 12px rgba(79, 195, 247, 0.2);
    }

    #hover-label.visible {
      opacity: 1;
    }

    #empty-state {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #empty-state.hidden {
      opacity: 0;
    }

    #empty-state h2 {
      font-family: var(--font-ui);
      font-size: 24px;
      font-weight: 300;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    #empty-state p {
      font-family: var(--font-mono);
      font-size: 12px;
      color: rgba(148, 163, 184, 0.5);
    }

    #mobile-toggle {
      display: none;
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      z-index: 25;
      cursor: pointer;
      border: none;
    }

    #mobile-toggle svg {
      width: 22px;
      height: 22px;
      stroke: var(--text-accent);
      fill: none;
      stroke-width: 2;
    }

    #loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 15, 26, 0.8);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #loading-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(79, 195, 247, 0.15);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      #control-bar {
        bottom: 80px;
        left: auto;
        right: 16px;
        transform: none;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      #control-bar.mobile-open {
        opacity: 1;
        pointer-events: auto;
      }

      #mobile-toggle {
        display: flex;
      }

      #info-panel {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        transform: translateY(100%);
        max-height: 40vh;
        overflow-y: auto;
      }

      #info-panel.visible {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport-container">
      <div id="viewport-left"></div>
      <div id="viewport-right" style="display:none;"></div>
      <div class="compare-divider"></div>
      <div class="compare-label" id="label-left">模型 A</div>
      <div class="compare-label" id="label-right">模型 B</div>
    </div>

    <div id="empty-state">
      <h2>MolView</h2>
      <p>上传 XYZ / PDB 文件以加载分子模型</p>
    </div>

    <div id="control-bar" class="glass-panel">
      <input type="file" id="file-input" class="file-input" accept=".xyz,.pdb" />
      <button class="btn" id="btn-upload" title="上传文件">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>上传</span>
      </button>
      <div class="separator"></div>
      <button class="btn active" id="btn-ball-stick" data-mode="ball-and-stick" title="球棍模型">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></svg>
      </button>
      <button class="btn" id="btn-space-fill" data-mode="space-filling" title="空间填充模型">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
      </button>
      <button class="btn" id="btn-wireframe" data-mode="wireframe" title="线框模型">
        <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/><line x1="19.07" y1="4.93" x2="4.93" y2="19.07"/></svg>
      </button>
      <div class="separator"></div>
      <button class="btn" id="btn-labels" title="原子标签">
        <svg viewBox="0 0 24 24"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
        <span>标签</span>
      </button>
      <button class="btn" id="btn-reset" title="重置视角">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      </button>
      <div class="separator"></div>
      <button class="btn" id="btn-compare" title="多模型对比">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>
        <span>对比</span>
      </button>
    </div>

    <div id="info-panel" class="glass-panel">
      <div class="panel-title">原子信息</div>
      <div id="atom-info-content"></div>
    </div>

    <div id="hover-label"></div>

    <button id="mobile-toggle" class="glass-panel">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>

    <div id="loading-overlay">
      <div class="spinner"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
