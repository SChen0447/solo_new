<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>赛车竞速原型模拟器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1A1A2E;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #ccc;
    }
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 40px;
      background: rgba(26,26,46,0.95);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      border-bottom: 1px solid #3A3A55;
    }
    #header h1 {
      font-size: 16px; font-weight: 600; color: #00FF88;
    }
    #header .info {
      font-size: 12px; color: #888;
    }
    #canvas-container {
      position: fixed; top: 40px; left: 0; right: 0; bottom: 0;
    }
    canvas {
      display: block;
      width: 100%; height: 100%;
    }
    #chart-panel {
      position: fixed; top: 48px; left: 8px;
      width: 260px; height: 160px;
      background: rgba(26,26,46,0.85);
      border: 1px solid #3A3A55;
      border-radius: 8px;
      z-index: 50;
      pointer-events: none;
    }
    #chart-panel canvas {
      width: 100%; height: 100%;
    }
    #controls-bar {
      position: fixed; top: 48px; right: 8px;
      display: flex; flex-direction: column; gap: 6px;
      z-index: 50;
    }
    #controls-bar button {
      padding: 6px 14px;
      background: #3A3A55;
      color: #00FF88;
      border: 1px solid #00FF88;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    #controls-bar button:hover {
      background: #4A4A6A;
    }
    #controls-bar button.active {
      background: #00FF88;
      color: #1A1A2E;
    }
    #track-info {
      position: fixed; bottom: 12px; right: 12px;
      background: rgba(26,26,46,0.85);
      border: 1px solid #3A3A55;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      color: #aaa;
      z-index: 50;
    }
    #mode-indicator {
      position: fixed; bottom: 12px; left: 8px;
      background: rgba(26,26,46,0.85);
      border: 1px solid #00FF88;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      color: #00FF88;
      z-index: 50;
    }
    @media (max-width: 768px) {
      #chart-panel { width: 180px; height: 110px; }
      #controls-bar button { font-size: 10px; padding: 4px 10px; }
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>赛车竞速原型模拟器</h1>
    <span class="info">点击网格添加控制点 | 拖拽编辑控制点 | W/A/S/D 操控赛车</span>
  </div>
  <div id="canvas-container">
    <canvas id="mainCanvas"></canvas>
  </div>
  <div id="chart-panel">
    <canvas id="chartCanvas"></canvas>
  </div>
  <div id="controls-bar">
    <button id="btn-edit" class="active">编辑赛道</button>
    <button id="btn-drive">驾驶模式</button>
    <button id="btn-record">开始录制</button>
    <button id="btn-clear">清除赛道</button>
  </div>
  <div id="track-info">
    <div>赛道总长: <span id="track-length">0</span> m</div>
    <div>弯道数量: <span id="track-curves">0</span></div>
  </div>
  <div id="mode-indicator">模式: 编辑</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
